# render.yaml — Palm Legacy v3.2
#
# IMPORTANT — MySQL on Render:
# Render's free DB is PostgreSQL. Palm Legacy uses MySQL.
# Use an EXTERNAL MySQL provider (free options below), then
# set DB_HOST, DB_PORT, DB_USER, DB_PASSWORD, DB_NAME in
# Render dashboard → Environment.
#
# Free MySQL providers:
#   • Railway     → railway.app        (500MB free)
#   • PlanetScale → planetscale.com    (5GB free)
#   • Clever Cloud→ clever-cloud.com   (free tier)
#   • Aiven       → aiven.io           (free trial)

services:
  - type: web
    name: palm-legacy
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000

      # ── Database — set these in Render Dashboard → Environment ───────────
      # Copy values from your MySQL provider (Railway / PlanetScale etc.)
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false

      # ── Required secret ──────────────────────────────────────────────────
      # Generate: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      - key: JWT_SECRET
        sync: false

      # ── CORS — set to your Render URL once deployed ──────────────────────
      - key: ALLOWED_ORIGIN
        sync: false

      # ── Shiprocket (optional) ────────────────────────────────────────────
      - key: SHIPROCKET_EMAIL
        sync: false
      - key: SHIPROCKET_PASSWORD
        sync: false
      - key: SHIPROCKET_PICKUP_LOCATION
        sync: false
      - key: SHIPROCKET_CHANNEL_ID
        sync: false

      # ── Razorpay (optional) ──────────────────────────────────────────────
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

      # ── Email OTP (optional) ─────────────────────────────────────────────
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

      # ── SMS OTP — MSG91 (optional) ───────────────────────────────────────
      - key: MSG91_AUTH_KEY
        sync: false
      - key: MSG91_TEMPLATE_ID
        sync: false

      # ── WhatsApp OTP — WATI (optional) ───────────────────────────────────
      - key: WATI_API_URL
        sync: false
      - key: WATI_ACCESS_TOKEN
        sync: false

      # ── WhatsApp OTP — Twilio (optional) ─────────────────────────────────
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
